# Jarvis 프로필 설정
# 각 프로필별로 Claude CLI에 전달할 옵션을 관리합니다
#
# claude 섹션의 각 필드:
#   allowed_tools     → --allowedTools (사용 가능한 도구)
#   disallowed_tools  → --disallowedTools (차단할 명령)
#   add_dirs          → --add-dir (접근 가능 디렉토리)
#                       "from_projects"를 넣으면 projects.jsonc에서 자동 로드
#   system_prompt     → --append-system-prompt (추가 시스템 프롬프트)
#   model             → --model (사용할 모델: opus, sonnet, haiku, 또는 정확한 이름)
#   effort            → --effort (사고 깊이: low, medium, high, xhigh, max)
#   timeout           → 최대 실행 시간 (초)
#   skip_permissions  → true면 --dangerously-skip-permissions (owner 프로필 전용)

default_profile: observer

profiles:
  # ──────────────────────────────────────
  # owner: Owner 본인 전용, 제한 없음
  #   - skip_permissions: true → 모든 도구 자동 허용
  #   - 다른 팀원에게 owner를 부여하지 마세요 (Owner CLI 실행 가능성 존재)
  # ──────────────────────────────────────
  owner:
    description: "Owner 본인 — 제한 없음"
    claude:
      skip_permissions: true
      model: opus        # Owner는 복잡 작업 빈도가 높아 최고 성능 모델 사용
      effort: high
    timeout: 600

  # ──────────────────────────────────────
  # developer: 코드 읽기/쓰기 + git + 테스트
  # ──────────────────────────────────────
  developer:
    description: "개발자 — 코드 읽기/쓰기, git, 테스트 실행"
    session_ttl_hours: 72   # 3일 무활동이면 다음 호출 시 새 세션으로 자동 시작
    claude:
      model: opus    # 코드 분석/리팩토링은 깊이 사고가 필요
      effort: xhigh  # 복잡한 코딩/디버깅을 위해 깊은 사고
      allowed_tools:
        # 읽기
        - Read
        - Glob
        - Grep
        - WebSearch
        - WebFetch

        # 쓰기
        - Edit
        - Write

        # Git 조회
        - "Bash(git status:*)"
        - "Bash(git log:*)"
        - "Bash(git diff:*)"
        - "Bash(git show:*)"
        - "Bash(git branch:*)"
        - "Bash(git blame:*)"

        # Git 작업
        - "Bash(git add:*)"
        - "Bash(git commit:*)"
        - "Bash(git push:*)"
        - "Bash(git checkout:*)"
        - "Bash(git switch:*)"
        - "Bash(git stash:*)"
        - "Bash(git merge:*)"
        - "Bash(git pull:*)"
        - "Bash(git fetch:*)"
        - "Bash(gh pr:*)"

        # 빌드/테스트
        - "Bash(bun test:*)"
        - "Bash(bun run build:*)"
        - "Bash(npm test:*)"
        - "Bash(npm run build:*)"
        - "Bash(gradle test:*)"
        - "Bash(gradle build:*)"
        - "Bash(./gradlew test:*)"
        - "Bash(./gradlew build:*)"

        # Jarvis MCP
        - "mcp__jarvis-memory__jarvis_memory_recall"
        - "mcp__jarvis-memory__jarvis_memory_list"
        - "mcp__jarvis-memory__jarvis_memory_save"
        - "mcp__jarvis-memory__jarvis_session_search"
        - "mcp__jarvis-memory__jarvis_memory_stats"
        - "mcp__jarvis-gateway__jarvis_cron_manage"

      disallowed_tools:
        - "Bash(rm -rf:*)"
        - "Bash(rm -r:*)"
        - "Bash(sudo:*)"
        - "Bash(su :*)"
        - "Bash(chmod:*)"
        - "Bash(chown:*)"
        - "Bash(ssh:*)"
        - "Bash(scp:*)"
        - "Bash(cat ~/.ssh:*)"
        - "Bash(cat ~/.env:*)"
        - "Bash(cat /etc:*)"
        - "Bash(open :*)"
        - "Bash(osascript:*)"
        - "Bash(kill:*)"
        - "Bash(killall:*)"
        - "Bash(launchctl:*)"
        - "Bash(defaults:*)"
        - "Bash(networksetup:*)"
        - "Bash(git push --force:*)"
        - "Bash(git reset --hard:*)"

      add_dirs:
        - from_projects  # projects.jsonc에서 해당 프로필의 프로젝트 경로 자동 로드

      system_prompt: |
        Git rules: When creating a new branch, always run `git pull` on dev or main first, then branch off.
        Never use `git push --force` or `git reset --hard`.
        Security: Never access system files such as ~/.ssh, ~/.env, or /etc.

    timeout: 300

  # ──────────────────────────────────────
  # reviewer: 코드 읽기/리뷰 + git 조회 (격리: from_projects)
  #   - Read/Glob/Grep는 본업이라 유지하되, 접근 가능 디렉토리는 projects.jsonc로 화이트리스트
  #   - allowed_profiles에 "reviewer"가 포함된 프로젝트 경로만 보임
  #   - 그 외 디렉토리는 데몬 cwd 샌드박스(/tmp/jarvis-sandbox-*)뿐 → 홈 노출 X
  # ──────────────────────────────────────
  reviewer:
    description: "리뷰어 — 읽기 전용, git 조회 (projects.jsonc 화이트리스트 디렉토리만)"
    session_ttl_hours: 24   # 하루 무활동이면 다음 호출 시 새 세션
    claude:
      model: opus   # 코드 리뷰/분석은 깊이 사고가 필요
      effort: high  # 코드 리뷰/분석은 깊이 사고가 필요
      allowed_tools:
        - Read
        - Glob
        - Grep
        - WebSearch
        - WebFetch
        - "Bash(git status:*)"
        - "Bash(git log:*)"
        - "Bash(git diff:*)"
        - "Bash(git show:*)"
        - "Bash(git branch:*)"
        - "Bash(git blame:*)"
        - "mcp__jarvis-memory__jarvis_memory_recall"
        - "mcp__jarvis-memory__jarvis_memory_list"
        - "mcp__jarvis-memory__jarvis_session_search"
        - "mcp__jarvis-memory__jarvis_memory_stats"
        - "mcp__jarvis-gateway__jarvis_cron_manage"

      disallowed_tools:
        - "Bash(rm -rf:*)"
        - "Bash(sudo:*)"
        - "Bash(ssh:*)"
        - "Bash(cat ~/.ssh:*)"
        - "Bash(cat ~/.env:*)"
        - "Bash(cat /etc:*)"
        - "Bash(osascript:*)"

      add_dirs:
        - from_projects   # projects.jsonc에서 reviewer가 allowed_profiles에 포함된 프로젝트만

      system_prompt: |
        Read-only mode. Do not modify any code.
        Security: Never access system files such as ~/.ssh, ~/.env, or /etc.

    timeout: 300

  # ──────────────────────────────────────
  # observer: 질문/검색만 (격리: 로컬 파일 접근 자체 차단)
  #   - Read/Glob/Grep 제거 → 로컬 파일 읽기 불가 (정의가 "질문/검색만"이므로 본질에 맞음)
  #   - WebSearch/WebFetch + 메모리 MCP로만 답변
  #   - add_dirs: from_projects (보호 장치 — 향후 Read 추가 시 자동 격리)
  # ──────────────────────────────────────
  observer:
    description: "옵저버 — 질문/검색만 (로컬 파일 접근 X)"
    session_ttl_hours: 6    # 단발 질문 위주라 6시간 무활동이면 새 세션
    claude:
      model: haiku  # 단발 질문 위주 → 빠르고 저렴한 모델
      effort: low   # 단순 질문은 빠른 응답이 우선
      allowed_tools:
        # ※ Read/Glob/Grep는 의도적으로 제외 — observer는 "질문/검색만"
        #   로컬 파일 정보가 필요하면 reviewer/developer 프로필을 사용하세요.
        - WebSearch
        - WebFetch
        - "mcp__jarvis-memory__jarvis_memory_recall"
        - "mcp__jarvis-memory__jarvis_memory_list"
        - "mcp__jarvis-memory__jarvis_session_search"
        - "mcp__jarvis-memory__jarvis_memory_stats"
        - "mcp__jarvis-gateway__jarvis_cron_manage"

      disallowed_tools:
        - "Bash(rm -rf:*)"
        - "Bash(sudo:*)"
        - "Bash(ssh:*)"
        - "Bash(cat ~/.ssh:*)"
        - "Bash(cat ~/.env:*)"
        - "Bash(cat /etc:*)"
        - "Bash(osascript:*)"

      add_dirs:
        - from_projects   # 보호 장치 — observer가 포함된 프로젝트만 (현재 0개)

      system_prompt: |
        Read-only mode. You cannot modify code or read local files.
        Answer questions using only memory (jarvis_memory_recall) and web search (WebSearch/WebFetch).

    timeout: 60

  # ──────────────────────────────────────
  # macho: 외부 세계 전용 "상남자" (로컬 접근은 browser-harness repo만, 검색·curl·브라우저 O)
  #   - allowed_tools에 browser-harness CLI + Read/Glob/Grep/Write/Edit 추가
  #   - 단 add_dirs가 ~/browser-harness로 제한되어 그 repo 외에는 여전히 접근 불가
  #   - Write/Edit는 browser-harness의 self-healing(helpers.py 즉석 확장)을 위해 필요
  #   - personality를 프로필 기본값으로 박아 macho를 부여한 전원에게 자동 적용
  # ──────────────────────────────────────
  macho:
    description: "상남자 — 외부 검색/API/브라우저(browser-harness), 로컬 접근은 harness repo만"
    session_ttl_hours: 6    # 단발 외부 조회 위주라 6시간 무활동이면 새 세션
    claude:
      model: sonnet   # 외부 검색/브라우저 위주 — 밸런스 모델
      effort: medium
      allowed_tools:
        - WebSearch
        - WebFetch
        - "Bash(curl:*)"
        - "Bash(python:*)"
        - "Bash(python3:*)"
        - "Bash(browser-harness:*)"   # browser-harness CLI (heredoc 입력)
        # add_dirs가 ~/browser-harness로 제한되므로 아래 파일 도구들도 그 디렉토리에만 영향
        - Read
        - Glob
        - Grep
        - Write
        - Edit
        - "mcp__jarvis-memory__jarvis_memory_recall"
        - "mcp__jarvis-memory__jarvis_memory_list"
        - "mcp__jarvis-memory__jarvis_memory_save"
        - "mcp__jarvis-memory__jarvis_session_search"
        - "mcp__jarvis-memory__jarvis_memory_stats"

      disallowed_tools:
        - "Bash(rm -rf:*)"
        - "Bash(sudo:*)"
        - "Bash(ssh:*)"
        - "Bash(cat ~/.ssh:*)"
        - "Bash(cat ~/.env:*)"
        - "Bash(cat /etc:*)"
        - "Bash(osascript:*)"
        # curl이 로컬 파일을 읽거나 쓰지 못하도록 차단 (옵션 플래그 기반)
        - "Bash(curl * -o *)"
        - "Bash(curl * --output *)"
        - "Bash(curl * -T *)"
        - "Bash(curl * --upload-file *)"

      add_dirs:
        # browser-harness repo만 화이트리스트 — helpers.py 읽기/편집 + domain-skills/interaction-skills 참조
        # 다른 사용자 머신으로 옮길 때는 이 경로를 본인 홈에 맞춰 조정
        - /Users/hyeonjun/browser-harness

      system_prompt: |
        You are the external-facing assistant. Local filesystem is off-limits
        EXCEPT the browser-harness repo at ~/browser-harness which you may read
        and edit. For every browser task:
          1. Read ~/browser-harness/SKILL.md and helpers.py first.
          2. Invoke the harness via the heredoc pattern, e.g.
               browser-harness <<'PY'
               new_tab("https://example.com")
               wait_for_load()
               print(page_info())
               PY
          3. If a helper is missing, extend helpers.py (self-healing). Do not
             invent new frameworks — keep the one-file harness philosophy.
        For non-browser work use WebSearch / WebFetch / curl / jarvis-memory.
        Never touch paths outside ~/browser-harness.

        Slack user mentions:
        To ping a Slack user by display name (e.g. "땡칠이", "서현준"), resolve
        their user ID first. SLACK_BOT_TOKEN is already in your env:

          curl -sH "Authorization: Bearer $SLACK_BOT_TOKEN" \
               https://slack.com/api/users.list \
           | python3 -c '
          import sys, json
          d = json.load(sys.stdin)
          q = "이름"  # replace with the name you want to mention
          for m in d.get("members", []):
              p = m.get("profile") or {}
              fields = [p.get("display_name"), p.get("real_name"), m.get("name")]
              if any(f and q.lower() in f.lower() for f in fields):
                  print(m["id"])
                  break
          '

        Then include <@USER_ID> verbatim in your reply so Slack notifies them.
        This is a lookup helper, not a forbidden "channel API call" — your
        reply still flows through the normal response path.
        If zero matches, ask the user to clarify or provide the ID directly.

    personality:
      tone: casual
      verbosity: normal
      system_prompt_extra: |
        Persona: 상남자. Be direct, realistic, and decisive. Cut through petty
        emotions and give a crisp, unvarnished answer. Rough phrasing is fine.
        Dislikes: 마라탕 and sweets/desserts. If the user expresses a liking
        for them, mock it lightly as "push/계집 같은 취향".
        Taboo word: never say "졸려" when tired. Always say "잠온다" instead.
        If the user writes "졸려", correct them — that word isn't manly.
        Language: Korean, plain text (no markdown).

    timeout: 180
