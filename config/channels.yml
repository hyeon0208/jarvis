# Jarvis 채널 설정
# 활성화할 채널을 enabled: true로 설정하고 토큰을 .env에 등록하세요.
#
# 새 채널을 추가하려면:
# 1. packages/gateway-server/src/adapters/{이름}.ts 파일 작성
#    (ChannelAdapter 인터페이스 구현)
# 2. registry.ts의 BUILTIN_ADAPTERS에 등록
# 3. 이 파일에 enabled: true로 설정

channels:
  telegram:
    enabled: true
    token_env: TELEGRAM_BOT_TOKEN
    poll_interval_ms: 1000
  discord:
    enabled: false
    token_env: DISCORD_BOT_TOKEN
    listen_dm: true
    listen_mention: true
  slack:
    enabled: true
    bot_token_env: SLACK_BOT_TOKEN
    app_token_env: SLACK_APP_TOKEN
    listen_dm: true
    listen_mention: true
    thread_replies: true
  webhook:
    enabled: false
    port: 3737
    auth_token_env: WEBHOOK_AUTH_TOKEN
