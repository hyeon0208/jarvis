# Jarvis мұ„л„җ м„Өм •
# нҷңм„ұнҷ”н•  мұ„л„җмқ„ enabled: trueлЎң м„Өм •н•ҳкі  нҶ нҒ°мқ„ .envм—җ л“ұлЎқн•ҳм„ёмҡ”.
#
# мғҲ мұ„л„җмқ„ м¶”к°Җн•ҳл Өл©ҙ:
# 1. packages/gateway-server/src/adapters/{мқҙлҰ„}.ts нҢҢмқј мһ‘м„ұ
#    (ChannelAdapter мқён„°нҺҳмқҙмҠӨ кө¬нҳ„)
# 2. registry.tsмқҳ BUILTIN_ADAPTERSм—җ л“ұлЎқ
# 3. мқҙ нҢҢмқјм—җ enabled: trueлЎң м„Өм •

channels:
  telegram:
    enabled: true
    token_env: TELEGRAM_BOT_TOKEN
    poll_interval_ms: 1000
  discord:
    enabled: false
    token_env: DISCORD_BOT_TOKEN
    listen_dm: true
    listen_mention: true
  slack:
    enabled: true
    bot_token_env: SLACK_BOT_TOKEN
    app_token_env: SLACK_APP_TOKEN
    listen_dm: true
    listen_mention: true
    thread_replies: true
    # мһҗлҸҷ нҺҳм–ҙл§Ғ вҖ” мӣҢнҒ¬мҠӨнҺҳмқҙмҠӨк°Җ м ‘к·јмқ„ мқҙлҜё кІҢмқҙнҢ…н•ҳлҜҖлЎң мұ„л„җ л©ҳм…ҳмқҖ мҪ”л“ң м—Ҷмқҙ мҰүмӢң л“ұлЎқ.
    #   auto_pair_scope: mention_only вҶ’ DM мІ« л©”мӢңм§ҖлҠ” м—¬м „нһҲ нҺҳм–ҙл§Ғ мҪ”л“ң кІҪлЎң мң м§Җ
    #                    all          вҶ’ DMлҸ„ мһҗлҸҷ нҺҳм–ҙл§Ғ
    auto_pair: true
    auto_pair_profile: macho
    auto_pair_scope: mention_only
  webhook:
    enabled: false
    port: 3737
    auth_token_env: WEBHOOK_AUTH_TOKEN
